<!DOCTYPE html>

<head>

<title>Cargando...</title>
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;width:100%;overflow:hidden;}

    height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:Arial,Helvetica,sans-serif;color:#7a9e9f;
  }
  .dot{
    width:38px;height:38px;border-radius:50%;
    border:3px solid #1a2a30;border-top-color:#00c896;
    animation:spin 0.8s linear infinite;margin-bottom:14px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  p{font-size:13px;letter-spacing:0.5px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="dot"></div>
  <p>Cargando contenido…</p>
</div>
<script>
  // Navegación real de página completa hacia el direct link de Monetag.
  // Esto le da al anuncio el contexto normal de navegador que necesita
  // para resolver correctamente (en vez de un loadUrl() directo desde la app).
  var AD_URL = "https://omg10.com/4/8791092";
  setTimeout(function () {
    window.location.replace(AD_URL);
  }, 250);
</script>
</body>
