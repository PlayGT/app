const contenedor = document.getElementById("contenedor");
const inputBuscar = document.getElementById("buscar");

function renderizar(filtro = "") {
  contenedor.innerHTML = "";

  const filtrados = canales
    .filter(c => c.nombre.toLowerCase().includes(filtro.toLowerCase()))
    .sort((a, b) => a.nombre.localeCompare(b.nombre));

  filtrados.forEach(canal => {
    const urlCompleta = window.location.origin + "/canales.html?get=" + canal.get;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="nombre">${canal.nombre}</div>
      <div class="enlace">${urlCompleta}</div>
      <button class="copiar" data-url="${urlCompleta}">Copiar enlace</button>
    `;

    contenedor.appendChild(div);
  });
}

inputBuscar.addEventListener("input", e => {
  renderizar(e.target.value.trim());
});

renderizar();

document.addEventListener("click", e => {
  if (!e.target.classList.contains("copiar")) return;

  const btn = e.target;
  const texto = btn.dataset.url;

  navigator.clipboard.writeText(texto).then(() => {
    const original = btn.innerText;
    btn.innerText = "Copiado ✓";
    btn.classList.add("copiado");
    setTimeout(() => {
      btn.innerText = original;
      btn.classList.remove("copiado");
    }, 1800);
  }).catch(() => {
    alert("No se pudo copiar automáticamente. Copia manualmente: " + texto);
  });
});
